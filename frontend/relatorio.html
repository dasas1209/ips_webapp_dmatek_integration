<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de KPIs - Metric4</title>
    <link rel="stylesheet" href="/static/style.css?v=1.3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="relatorio-container">
        <button class="btn-voltar" onclick="window.location.href='/'">← Voltar ao Mapa</button>

        <!-- Gráfico 1: Distância Percorrida -->
        <div class="grafico-container">
            <h2>Distância Percorrida por Tag (m)</h2>
            <div class="chart-wrapper" id="wrapperDistancias">
                <canvas id="graficoDistancias"></canvas>
            </div>
        </div>

        <!-- Gráfico 2: Taxa de Utilização (OEE proxy) -->
        <div class="grafico-container">
            <h2>Taxa de Utilização por Tag (%)</h2>
            <div class="chart-wrapper" id="wrapperUtilizacao">
                <canvas id="graficoUtilizacao"></canvas>
            </div>
        </div>

        <!-- Gráfico 3: Nível de Bateria -->
        <div class="grafico-container">
            <h2>Nível de Bateria por Tag (%)</h2>
            <div class="chart-wrapper" id="wrapperBateria">
                <canvas id="graficoBateria"></canvas>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
